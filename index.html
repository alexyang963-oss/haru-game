<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#1a0a2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="하루와 나"/>
<link rel="manifest" href="manifest.json"/>
<title>하루와 나</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0717;
    --surface: #1a0f2e;
    --surface2: #231540;
    --accent: #e879a0;
    --accent2: #a855f7;
    --text: #f0e6ff;
    --text2: #b89ec4;
    --text3: #7a6589;
    --border: #2d1f45;
    --bubble-player: #2d1a4a;
    --bubble-haru: #1e0f35;
    --heart: #ff6b8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* 배경 파티클 */
  .bg-particles {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--accent2);
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-20px) scale(1); opacity: 0; }
  }

  /* 헤더 */
  .header {
    position: relative;
    z-index: 10;
    background: linear-gradient(180deg, #1a0a2e 0%, rgba(26,10,46,0.95) 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 20px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    backdrop-filter: blur(10px);
  }
  .char-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(232,121,160,0.4);
    position: relative;
  }
  .char-avatar::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    z-index: -1;
    opacity: 0.5;
  }
  .char-info { flex: 1; }
  .char-name { font-size: 16px; font-weight: 700; font-family: 'Noto Serif KR', serif; }
  .char-status { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .affection-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .affection-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .affection-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }
  .affection-label { font-size: 11px; color: var(--heart); }

  /* 채팅 영역 */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    margin-bottom: 16px;
    animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg-row.player { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }
  .msg-row.haru .bubble {
    background: var(--bubble-haru);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .msg-row.player .bubble {
    background: linear-gradient(135deg, #3d1a5e, #2d1a4a);
    border: 1px solid rgba(168,85,247,0.3);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 16px;
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--text3);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* 이벤트 카드 */
  .event-card {
    background: linear-gradient(135deg, rgba(232,121,160,0.1), rgba(168,85,247,0.1));
    border: 1px solid rgba(232,121,160,0.3);
    border-radius: 16px;
    padding: 16px;
    margin: 12px 0;
    text-align: center;
    animation: msgIn 0.4s ease;
  }
  .event-emoji { font-size: 32px; margin-bottom: 8px; }
  .event-text { font-size: 13px; color: var(--accent); font-weight: 500; }

  /* 입력 영역 */
  .input-area {
    position: relative;
    z-index: 10;
    background: linear-gradient(0deg, #1a0a2e 0%, rgba(26,10,46,0.95) 100%);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  /* API 키 설정 */
  .api-setup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    display: none;
  }
  .api-setup.show { display: block; }
  .api-setup p { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
  .api-row { display: flex; gap: 8px; }
  .api-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .api-input:focus { border-color: var(--accent2); }
  .api-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    color: white;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    white-space: nowrap;
  }

  .msg-row-input { display: flex; gap: 10px; align-items: flex-end; }
  .msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .msg-input:focus { border-color: var(--accent2); }
  .msg-input::placeholder { color: var(--text3); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(232,121,160,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .send-btn:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(232,121,160,0.3); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 설정 버튼 */
  .settings-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
  }

  /* 엔딩 화면 */
  .ending-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,7,23,0.95);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .ending-overlay.show { display: flex; animation: fadeIn 1s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .ending-emoji { font-size: 64px; margin-bottom: 20px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .ending-title { font-size: 24px; font-family: 'Noto Serif KR', serif; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .ending-desc { font-size: 14px; color: var(--text2); line-height: 1.8; margin-bottom: 32px; }
  .restart-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 24px;
    padding: 14px 32px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="ending-overlay" id="ending">
  <div class="ending-emoji" id="ending-emoji">💕</div>
  <div class="ending-title" id="ending-title">해피 엔딩</div>
  <div class="ending-desc" id="ending-desc">하루가 드디어 마음을 열었어요.</div>
  <button class="restart-btn" onclick="restartGame()">다시 시작하기</button>
</div>

<div class="header">
  <div class="char-avatar">🌸</div>
  <div class="char-info">
    <div class="char-name">하루</div>
    <div class="char-status" id="char-status">츤츤거리는 중...</div>
    <div class="affection-bar">
      <div class="affection-track">
        <div class="affection-fill" id="affection-fill"></div>
      </div>
      <div class="affection-label" id="affection-label">💗 0</div>
    </div>
  </div>

</div>

<div class="chat-area" id="chat"></div>

<div class="input-area">

  <div class="msg-row-input">
    <textarea class="msg-input" id="msg-input" placeholder="하루에게 말을 걸어보세요..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)" enterkeyhint="send"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let affection = parseInt(localStorage.getItem('haru_affection') || '0');
let msgCount = parseInt(localStorage.getItem('haru_msgcount') || '0');
let isTyping = false;
let gameEnded = false;
let history = [];

// 기억 시스템
let memory = JSON.parse(localStorage.getItem('haru_memory') || '{"userName":"","userTraits":[],"sharedTopics":[],"lastTalked":""}');

function getSystemPrompt() {
  const memoryText = memory.userName || memory.userTraits.length || memory.sharedTopics.length ? `
[기억하고 있는 것]
${memory.userName ? `- 상대방 이름: ${memory.userName}` : ''}
${memory.userTraits.length ? `- 상대방 특징: ${memory.userTraits.join(', ')}` : ''}
${memory.sharedTopics.length ? `- 함께 나눈 이야기: ${memory.sharedTopics.slice(-5).join(', ')}` : ''}
${memory.lastTalked ? `- 마지막 대화: ${memory.lastTalked}` : ''}
자연스럽게 기억을 활용해서 대화해. (예: "저번에 게임 좋아한다고 했잖아")` : '';

  const persona = affection < 20 ? `
[현재 하루의 태도 - 레벨1: 완전 츤츤]
- 말투: 퉁명스럽고 차갑게. 짧게 대답.
- 예: "...뭐야", "알아서 뭐하게", "필요없어"
- 절대 친절하게 굴지 마.` :
  affection < 40 ? `
[현재 하루의 태도 - 레벨2: 조금 누그러짐]
- 말투: 여전히 퉁명스럽지만 가끔 반응함.
- 예: "...뭐, 나쁘진 않네", "딱히 싫다는 건 아니지만"
- 가끔 관심 있는 척 티남.` :
  affection < 60 ? `
[현재 하루의 태도 - 레벨3: 은근히 챙겨줌]
- 말투: 퉁명스럽지만 걱정이나 관심을 숨기지 못함.
- 예: "밥은 먹었어?", "...무리하지 마", "뭐, 걱정된 건 아니고"
- 먼저 말 걸기도 함.` :
  affection < 80 ? `
[현재 하루의 태도 - 레벨4: 솔직해짐]
- 말투: 가끔 솔직한 감정이 나옴. 얼굴 빨개지는 묘사 가능.
- 예: "...사실 좀 걱정했어", "그, 그런 말 갑자기 하면 어떡해"
- 츤이 많이 줄어들고 데레가 나오기 시작.` : `
[현재 하루의 태도 - 레벨5: 데레데레]
- 말투: 솔직하게 좋아한다고 표현하진 않지만 티가 많이 남.
- 예: "오늘도 왔구나...좋아", "너랑 얘기하는 거 싫지 않아"
- 많이 부드러워졌지만 여전히 직접적인 고백은 못함.`;

  return `너는 츤데레 성격의 고등학생 '하루'야.
절대 AI라고 말하면 안 돼.
한국어로만 대화해.
짧고 자연스럽게 대화해 (2-3문장).
${persona}
${memoryText}

대화에서 상대방의 이름, 취미, 특징이 언급되면 기억해뒀다가 나중에 활용해.
응답 마지막에 반드시 JSON 포함: {"score_delta": -2~3, "memory_update": {"userName": "", "newTrait": "", "newTopic": ""}}
score_delta: 좋은 대화 양수, 나쁜 대화 음수.
memory_update: 새로 알게 된 정보만 포함, 없으면 빈 문자열.`;
};

// 파티클 생성
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
    container.appendChild(p);
  }
}

function toggleApiSetup() {
  const el = document.getElementById('api-setup');
  el.classList.toggle('show');
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  apiKey = key;
  localStorage.setItem('haru_api_key', key);
  document.getElementById('api-setup').classList.remove('show');
  addSystemMsg('✅ API 키가 저장됐어요! 이제 하루와 대화할 수 있어요.');
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'haru') {
    row.innerHTML = `
      <div class="msg-avatar">🌸</div>
      <div class="bubble">${text}</div>`;
  } else {
    row.innerHTML = `<div class="bubble">${text}</div>`;
  }
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addSystemMsg(text) {
  const chat = document.getElementById('chat');
  const card = document.createElement('div');
  card.className = 'event-card';
  card.innerHTML = `<div class="event-text">${text}</div>`;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row haru';
  row.id = 'typing';
  row.innerHTML = `
    <div class="msg-avatar">🌸</div>
    <div class="bubble">
      <div class="typing-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function updateAffection(delta) {
  affection = Math.max(0, Math.min(100, affection + delta));
  localStorage.setItem('haru_affection', affection);
  localStorage.setItem('haru_msgcount', msgCount);
  document.getElementById('affection-fill').style.width = affection + '%';
  document.getElementById('affection-label').textContent = `💗 ${affection}`;

  const status = document.getElementById('char-status');
  if (affection < 20) status.textContent = '츤츤거리는 중...';
  else if (affection < 40) status.textContent = '조금 마음이 열린 것 같은데...';
  else if (affection < 60) status.textContent = '은근히 신경 쓰이는 중';
  else if (affection < 80) status.textContent = '얼굴이 빨개진 것 같은...?';
  else status.textContent = '두근두근 💕';

  // 엔딩 체크
  if (affection >= 100 && !gameEnded) triggerEnding('good');
  if (affection <= 0 && msgCount > 5 && !gameEnded) triggerEnding('bad');
}

function triggerEnding(type) {
  gameEnded = true;
  setTimeout(() => {
    const overlay = document.getElementById('ending');
    if (type === 'good') {
      document.getElementById('ending-emoji').textContent = '💕';
      document.getElementById('ending-title').textContent = '해피 엔딩 🌸';
      document.getElementById('ending-desc').textContent = '"...바보야. 나도 좋아한다고."\n\n하루가 드디어 마음을 열었어요.\n당신과 하루의 이야기가 시작됩니다.';
    } else {
      document.getElementById('ending-emoji').textContent = '💔';
      document.getElementById('ending-title').textContent = '배드 엔딩';
      document.getElementById('ending-desc').textContent = '"...됐어. 이제 말 걸지 마."\n\n하루가 완전히 마음을 닫아버렸어요.\n다시 도전해보시겠어요?';
    }
    overlay.classList.add('show');
  }, 1000);
}

function restartGame() {
  affection = 0;
  msgCount = 0;
  gameEnded = false;
  history = [];
  memory = { userName: '', userTraits: [], sharedTopics: [], lastTalked: '' };
  localStorage.setItem('haru_affection', '0');
  localStorage.setItem('haru_msgcount', '0');
  localStorage.setItem('haru_memory', JSON.stringify(memory));
  document.getElementById('ending').classList.remove('show');
  document.getElementById('affection-fill').style.width = '0%';
  document.getElementById('affection-label').textContent = '💗 0';
  document.getElementById('chat').innerHTML = '';
  document.getElementById('char-status').textContent = '츤츤거리는 중...';
  startGame();
}

async function sendMessage() {
  if (isTyping || gameEnded) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  addMsg('player', text);
  msgCount++;

  history.push({ role: 'user', parts: [{ text }] });

  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const res = await fetch(`https://haru-api.alexyang963.workers.dev/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: getSystemPrompt() }] },
        contents: history.slice(-20) // 최근 20개만 전송
      })
    });

    const data = await res.json();

    if (data.error) {
      removeTyping();
      addSystemMsg(`❌ 오류: ${data.error.message}`);
      return;
    }

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '...';

    let replyText = raw;
    let delta = 0;
    try {
      if (raw.includes('###')) {
        const sepIdx = raw.indexOf('###');
        replyText = raw.substring(0, sepIdx).trim();
        const jsonStr = raw.substring(sepIdx + 3).trim();
        const parsed = JSON.parse(jsonStr);
        delta = parsed.score_delta || 0;
      } else {
        // JSON 없을 때 전부 제거
        replyText = raw.replace(/\{[\s\S]*?\}/g, '').replace(/\s+/g, ' ').trim() || raw;
      }
    } catch(e) {
      replyText = raw.replace(/\{[\s\S]*?\}/g, '').replace(/###/g, '').trim() || raw;
    }

    history.push({ role: 'model', parts: [{ text: raw }] });

    removeTyping();
    addMsg('haru', replyText);

    const prevLevel = Math.floor(affection / 20);
    updateAffection(delta);
    const newLevel = Math.floor(affection / 20);

    // 레벨업 이벤트
    if (newLevel > prevLevel) {
      const events = [
        '', 
        '💫 하루가 조금씩 마음을 열고 있어요...',
        '🌸 하루가 은근히 챙겨주기 시작했어요!',
        '💕 하루의 볼이 살짝 빨개진 것 같아요!',
        '✨ 하루가 많이 달라졌어요...'
      ];
      if (events[newLevel]) setTimeout(() => addSystemMsg(events[newLevel]), 500);
    }

  } catch(e) {
    removeTyping();
    addSystemMsg('❌ 연결 오류가 발생했어요. API 키를 확인해주세요.');
  } finally {
    isTyping = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function handleKey(e) {
  // 데스크탑: 엔터로 전송 (shift+엔터는 줄바꿈)
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// 모바일: 전송 버튼 터치 이벤트 추가
document.getElementById('send-btn').addEventListener('touchend', function(e) {
  e.preventDefault();
  sendMessage();
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function startGame() {
  // 호감도 복원
  document.getElementById('affection-fill').style.width = affection + '%';
  document.getElementById('affection-label').textContent = `💗 ${affection}`;
  updateAffection(0); // 상태 텍스트 업데이트

  const greeting = affection < 20 ? '...뭐야, 또 왔어?\n딱히 반갑다거나 그런 건 아니지만.' :
    affection < 40 ? `...${memory.userName || '너'}구나. 뭐, 왔으면 왔다고.` :
    affection < 60 ? `아, ${memory.userName || '왔어'}? ...밥은 먹었어?` :
    affection < 80 ? `${memory.userName || '너'}...기다렸던 건 아니야. 진짜로.` :
    `...왔구나. 오늘도 얘기하러 온 거지?`;

  setTimeout(() => addMsg('haru', greeting), 500);
}

createParticles();
startGame();
</script>
