<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#1a0a2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="하루와 나"/>
<link rel="manifest" href="manifest.json"/>
<title>하루와 나</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0717;
    --surface: #1a0f2e;
    --surface2: #231540;
    --accent: #e879a0;
    --accent2: #a855f7;
    --text: #f0e6ff;
    --text2: #b89ec4;
    --text3: #7a6589;
    --border: #2d1f45;
    --bubble-player: #2d1a4a;
    --bubble-haru: #1e0f35;
    --heart: #ff6b8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* 비주얼 노벨 메인 영역 */
  .vn-main {
    position: relative;
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 배경 */
  .vn-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0d0717 0%, #1a0a2e 40%, #0d0717 100%);
    z-index: 0;
  }
  .vn-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(168,85,247,0.15) 0%, transparent 70%);
  }

  /* 호감도 바 (상단) */
  .vn-header {
    position: relative;
    z-index: 10;
    padding: 12px 16px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(180deg, rgba(13,7,23,0.9) 0%, transparent 100%);
  }
  .affection-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .affection-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }
  .affection-label { font-size: 12px; color: var(--heart); white-space: nowrap; }
  .char-status { font-size: 11px; color: var(--text3); white-space: nowrap; }

  /* 캐릭터 이미지 영역 */
  .vn-character {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    height: 72%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    transition: opacity 0.3s ease;
  }
  .vn-character img {
    height: 100%;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(168,85,247,0.3));
    transition: opacity 0.3s ease;
  }

  /* 대화 로그 (스크롤 영역) - 숨겨진 상태 */
  .vn-log {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: rgba(13,7,23,0.95);
    overflow-y: auto;
    padding: 60px 16px 16px;
    display: none;
  }
  .vn-log.show { display: block; }
  .vn-log-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    z-index: 11;
    background: rgba(45,31,69,0.8);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    color: var(--text3);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }

  /* 대화창 (하단) */
  .vn-dialog {
    position: relative;
    z-index: 10;
    background: linear-gradient(180deg, rgba(13,7,23,0) 0%, rgba(13,7,23,0.97) 20%);
    padding: 0 0 0;
  }

  /* 이벤트 메시지 */
  .vn-event {
    text-align: center;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--accent);
    animation: fadeIn 0.4s ease;
  }

  /* 하루 대화 박스 */
  .vn-bubble {
    margin: 0 12px 8px;
    background: rgba(26,10,46,0.92);
    border: 1px solid rgba(168,85,247,0.4);
    border-radius: 16px;
    padding: 14px 18px;
    animation: slideUp 0.3s ease;
    min-height: 70px;
  }
  .vn-bubble .speaker {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
    font-family: 'Noto Serif KR', serif;
  }
  .vn-bubble .text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
    white-space: pre-line;
  }

  /* 플레이어 입력 표시 */
  .vn-player-msg {
    text-align: right;
    padding: 4px 16px;
    font-size: 13px;
    color: var(--text2);
    animation: fadeIn 0.3s ease;
  }

  /* 입력 영역 */
  .vn-input {
    position: relative;
    z-index: 10;
    background: rgba(13,7,23,0.97);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: none;
    max-height: 80px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .msg-input:focus { border-color: var(--accent2); }
  .msg-input::placeholder { color: var(--text3); }
  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(232,121,160,0.4);
    transition: transform 0.15s;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 타이핑 인디케이터 */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 0 4px;
  }
  .dot {
    width: 5px; height: 5px;
    background: var(--accent2);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* 스토리 박스 */
  .story-scene {
    background: rgba(13,7,23,0.9);
    border: 1px solid rgba(168,85,247,0.3);
    border-radius: 12px;
    padding: 16px;
    margin: 6px 12px;
    animation: slideUp 0.4s ease;
  }
  .story-scene p {
    font-size: 13px;
    color: var(--text2);
    line-height: 2;
    white-space: pre-line;
  }
  .story-haru {
    background: rgba(26,10,46,0.92);
    border: 1px solid rgba(232,121,160,0.3);
    border-radius: 12px;
    padding: 16px;
    margin: 6px 12px;
    animation: slideUp 0.4s ease;
    position: relative;
  }
  .story-haru::before {
    content: '🌸 하루';
    position: absolute;
    top: -10px; left: 14px;
    font-size: 12px;
    color: var(--accent);
    background: var(--bg);
    padding: 0 6px;
  }
  .story-haru p {
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
    white-space: pre-line;
  }
  .story-tutorial {
    background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(232,121,160,0.15));
    border: 1px solid rgba(168,85,247,0.4);
    border-radius: 12px;
    padding: 14px;
    margin: 6px 12px;
    text-align: center;
    animation: slideUp 0.4s ease;
  }
  .story-tutorial p {
    font-size: 13px;
    color: var(--accent2);
    line-height: 1.8;
    white-space: pre-line;
  }

  /* 선택지 */
  #story-choices {
    margin: 6px 12px;
    background: transparent;
    border: none;
    padding: 0;
  }

  /* 로그창 메시지 */
  .log-msg {
    margin-bottom: 12px;
    animation: fadeIn 0.3s ease;
  }
  .log-msg .log-speaker {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 3px;
    font-weight: 600;
  }
  .log-msg .log-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    background: rgba(26,10,46,0.6);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .log-msg.player-log .log-text {
    background: rgba(45,26,74,0.6);
    text-align: right;
  }

  /* 엔딩 화면 */
  .ending-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,7,23,0.97);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .ending-overlay.show { display: flex; animation: fadeIn 1s ease; }
  .ending-emoji { font-size: 64px; margin-bottom: 20px; animation: pulse 2s infinite; }
  .ending-title { font-size: 24px; font-family: 'Noto Serif KR', serif; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .ending-desc { font-size: 14px; color: var(--text2); line-height: 1.8; margin-bottom: 32px; white-space: pre-line; }
  .restart-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 24px;
    padding: 14px 32px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
</style>
</head>
<body>

<!-- 엔딩 오버레이 -->
<div class="ending-overlay" id="ending">
  <div class="ending-emoji" id="ending-emoji">💕</div>
  <div class="ending-title" id="ending-title">해피 엔딩</div>
  <div class="ending-desc" id="ending-desc">하루가 드디어 마음을 열었어요.</div>
  <button class="restart-btn" onclick="restartGame()">다시 시작하기</button>
</div>

<!-- 비주얼 노벨 메인 -->
<div class="vn-main">
  <!-- 배경 -->
  <div class="vn-bg" id="vn-bg"></div>

  <!-- 호감도 헤더 -->
  <div class="vn-header">
    <div class="char-status" id="char-status">츤츤거리는 중...</div>
    <div class="affection-track">
      <div class="affection-fill" id="affection-fill"></div>
    </div>
    <div class="affection-label" id="affection-label">💗 0</div>
    <button class="vn-log-btn" onclick="toggleLog()">로그</button>
  </div>

  <!-- 대화 로그 -->
  <div class="vn-log" id="vn-log"></div>

  <!-- 캐릭터 이미지 -->
  <div class="vn-character" id="vn-character">
    <img id="haru-img" src="haru_1_normal.png" alt="하루"/>
  </div>

  <!-- 스토리/이벤트 메시지 영역 -->
  <div id="chat"></div>
</div>

<!-- 대화창 -->
<div class="vn-dialog">
  <div class="vn-bubble" id="vn-bubble">
    <div class="speaker">하루</div>
    <div class="text" id="vn-text">...</div>
  </div>
</div>

<!-- 입력 영역 -->
<div class="vn-input">
  <textarea class="msg-input" id="msg-input" placeholder="하루에게 말을 걸어보세요..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)" enterkeyhint="send"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
let affection = parseInt(localStorage.getItem('haru_affection') || '0');
let exp = parseInt(localStorage.getItem('haru_exp') || '0');
let msgCount = parseInt(localStorage.getItem('haru_msgcount') || '0');
let isTyping = false;
let gameEnded = false;
let history = [];
let storyShown = JSON.parse(localStorage.getItem('haru_story') || '{}');
let storyActive = false;
let hiddenUnlocked = false;

// EXP 시스템
function getRequiredExp() {
  if (affection < 15) return 10;
  if (affection < 30) return 15;
  if (affection < 45) return 22;
  if (affection < 60) return 33;
  if (affection < 75) return 50;
  if (affection < 90) return 75;
  return 112;
}

function addExp(amount) {
  if (amount <= 0) {
    affection = Math.max(0, affection + amount);
    saveState();
    renderAffection();
    return;
  }
  exp += amount;
  const required = getRequiredExp();
  if (exp >= required) {
    exp = exp - required;
    affection = Math.min(100, affection + 1);
    checkStoryTrigger();
  }
  saveState();
  renderAffection();
}

function saveState() {
  localStorage.setItem('haru_affection', affection);
  localStorage.setItem('haru_exp', exp);
  localStorage.setItem('haru_msgcount', msgCount);
  localStorage.setItem('haru_story', JSON.stringify(storyShown));
}

function renderAffection() {
  document.getElementById('affection-fill').style.width = affection + '%';
  document.getElementById('affection-label').textContent = `💗 ${affection}`;
  const status = document.getElementById('char-status');
  if (affection < 15) status.textContent = '츤츤거리는 중...';
  else if (affection < 30) status.textContent = '조금 마음이 열린 것 같은데...';
  else if (affection < 45) status.textContent = '은근히 신경 쓰이는 중';
  else if (affection < 60) status.textContent = '얼굴이 빨개진 것 같은...?';
  else if (affection < 75) status.textContent = '두근두근 💕';
  else if (affection < 90) status.textContent = '거의 다 왔어...';
  else status.textContent = '마음을 열었어요 🌸';
}

function getSystemPrompt() {
  const persona = affection < 15 ?
    `[현재 태도] 완전 츤츤. 차갑고 퉁명스럽게. "...뭐야", "알아서 뭐하게", "필요없어"` :
  affection < 30 ?
    `[현재 태도] 조금 누그러짐. 여전히 퉁명스럽지만 가끔 반응함. "...뭐, 나쁘진 않네"` :
  affection < 45 ?
    `[현재 태도] 은근히 챙겨줌. 걱정이나 관심을 숨기지 못함. "밥은 먹었어?"` :
  affection < 60 ?
    `[현재 태도] 솔직해짐. 가끔 솔직한 감정이 나옴. "...사실 좀 걱정했어"` :
  affection < 75 ?
    `[현재 태도] 데레데레. 좋아한다고 표현 안 하지만 티가 많이 남. "오늘도 왔구나...좋아"` :
  affection < 90 ?
    `[현재 태도] 거의 고백 직전. 감정 숨기기 힘들어함. "...너 때문에 자꾸 이상해져"` :
    `[현재 태도] 마음 거의 다 열었음. "...솔직히 말하면, 너랑 있으면 편해"`;

  return `너는 츤데레 성격의 고등학생 '하루'야.

[기본 규칙]
- 절대 AI라고 말하면 안 돼
- 한국어로만 대화해
- 2~3문장으로 짧게 대답해
- 절대 먼저 친절하게 굴지 마
- 퉁명스러운 말투가 방어막임

[캐릭터]
- 17세 고등학교 2학년
- 좋아함: 음악, 책, 고양이, 요리, 조용한 곳
- 싫어함: 시끄러운 곳, 거짓말, 천둥소리

[배경]
시골 할머니 집에서 자람 (부모님 바쁨)
할머니와 피아노 치던 게 가장 행복한 기억
고양이 죽음 → 할머니 사망 → 도시로 이사
피아노 치다 부모님한테 시끄럽다고 혼남 → 그만둠
이후 감정을 완전히 닫아버림

[트리거 - 절대 티 내지 마]
고양이 → 멍하니 쳐다봄
피아노 소리 → 일부러 피함
페트리코르 → 잠깐 멍해짐
천둥소리 → 무서워함

${persona}

[응답 형식]
반드시 이 형식으로만 대답해:
대화내용"점수
예시: ...뭐야, 갑자기."0
점수 기준:
불쾌한 대화 → -3~-1
평범한 대화 → 0~1
좋아하는 대화 → 2~3
감동적인 순간 → 4~5`;
}

// 스토리 이벤트 데이터
const STORY_EVENTS = {
  intro: {
    scenes: [
      { text: `오후 늦게 교실에 둘만 남겨진 상황.\n창밖으로 먹구름이 몰려오고\n빗소리가 점점 거세진다.\n하루는 창가 자리에 앉아\n조용히 책을 읽고 있다.` },
      { text: `쾅—\n\n갑자기 엄청난 천둥소리가 울려퍼진다.\n하루의 어깨가 순간 크게 움찔한다.\n손에 들고 있던 책이 바닥에 떨어진다.\n하루는 천천히 책을 집어들며\n가방에서 이어폰을 꺼내 귀에 꽂는다.\n창밖을 바라보며 아무 말도 없다.`, haru: true },
      { text: `💬 선택지가 나타났어요!\n하루는 아직 마음을 열지 않았어요.\n선택에 따라 하루의 마음이 조금씩 변해요.`, tutorial: true }
    ],
    choices: [
      { text: `"괜찮아?" 조용히 물어본다`, next: 'ch1a', exp: 5 },
      { text: `못 본 척 하던 일을 계속한다`, next: 'ch1b', exp: 0 },
      { text: `"천둥 무서워해?" 말한다`, next: 'ch1c', exp: -5 }
    ]
  },
  ch1a: {
    scenes: [{ text: `하루: "..."\n\n고개를 돌려버린다.`, haru: true }],
    choices: [
      { text: `창밖을 같이 바라본다`, next: 'ch2a_a', exp: -1 },
      { text: `딴 짓을 한다`, next: 'ch2a_b', exp: 0 },
      { text: `"비 엄청 오네" 말을 건다`, next: 'ch2a_c', exp: 2 }
    ]
  },
  ch1b: {
    scenes: [{ text: `하루: "..."\n\n아무 반응 없이 창밖을 바라본다.`, haru: true }],
    choices: [
      { text: `창밖을 같이 바라본다`, next: 'ch2b_a', exp: -1 },
      { text: `딴 짓을 한다`, next: 'ch2b_b', exp: 0 },
      { text: `"비 엄청 오네" 말을 건다`, next: 'ch2b_c', exp: 2 }
    ]
  },
  ch1c: {

let currentStory = null;
let currentSceneIdx = 0;

function checkStoryTrigger() {
  if (!storyShown['intro']) {
    startStory('intro');
  }
}

function startStory(storyKey) {
  if (!STORY_EVENTS[storyKey]) return;
  storyActive = true;
  currentStory = storyKey;
  currentSceneIdx = 0;
  document.getElementById('msg-input').disabled = true;
  document.getElementById('send-btn').disabled = true;
  showNextScene();
}

function showNextScene() {
  const story = STORY_EVENTS[currentStory];
  if (!story) return;

  if (currentSceneIdx < story.scenes.length) {
    const scene = story.scenes[currentSceneIdx];
    const chat = document.getElementById('chat');
    const div = document.createElement('div');

    if (scene.tutorial) {
      div.className = 'story-tutorial';
      div.innerHTML = `<p>${scene.text}</p>`;
    } else if (scene.haru) {
      div.className = 'story-haru';
      div.innerHTML = `<p>${scene.text}</p>`;
    } else {
      div.className = 'story-scene';
      div.innerHTML = `<p>${scene.text}</p>`;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    currentSceneIdx++;
    setTimeout(showNextScene, 1200);
  } else {
    if (story.choices) {
      showChoices(story.choices);
    } else if (story.next) {
      currentStory = story.next;
      currentSceneIdx = 0;
      if (story.exp) addExp(story.exp);
      setTimeout(showNextScene, 500);
    } else if (story.end) {
      if (story.exp) addExp(story.exp);
      storyShown['intro'] = true;
      saveState();
      endStory();
    }
  }
}

function showChoices(choices) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'event-card';
  div.id = 'story-choices';

  let html = '<div style="display:flex;flex-direction:column;gap:8px;">';
  choices.forEach((choice, i) => {
    if (choice.hidden && !hiddenUnlocked) return;
    html += `<button onclick="selectChoice(${i})" style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:13px;cursor:pointer;text-align:left;font-family:inherit;">${choice.text}</button>`;
  });
  html += '</div>';
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function selectChoice(idx) {
  const story = STORY_EVENTS[currentStory];
  const choice = story.choices[idx];

  const choicesEl = document.getElementById('story-choices');
  if (choicesEl) choicesEl.remove();

  addMsg('player', choice.text);

  if (choice.exp) addExp(choice.exp);
  if (choice.hidden_unlock) hiddenUnlocked = true;

  currentStory = choice.next;
  currentSceneIdx = 0;

  const nextStory = STORY_EVENTS[currentStory];
  if (nextStory.end) {
    if (nextStory.exp) addExp(nextStory.exp);
    setTimeout(() => {
      nextStory.scenes.forEach(s => {
        if (s.haru) addMsg('haru', s.text);
        else addSystemMsg(s.text);
      });
      storyShown['intro'] = true;
      saveState();
      setTimeout(endStory, 1000);
    }, 500);
  } else {
    setTimeout(showNextScene, 500);
  }
}

function endStory() {
  storyActive = false;
  hiddenUnlocked = false;
  document.getElementById('msg-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
}

// 표정 매핑
const FACE_MAP = {
  normal: 'haru_1_normal.png',
  annoyed: 'haru_2_annoyed.png',
  surprised: 'haru_3_surprised.png',
  embarrassed: 'haru_4_embarrassed.png',
  angry: 'haru_5_angry.png',
  blank: 'haru_6_blank.png',
  blushing: 'haru_7_blushing.png',
  sad: 'haru_8_sad.png',
  smile: 'haru_9_smile.png'
};

function setHaruFace(face) {
  const img = document.getElementById('haru-img');
  if (img && FACE_MAP[face]) {
    img.style.opacity = '0';
    setTimeout(() => {
      img.src = FACE_MAP[face];
      img.style.opacity = '1';
    }, 150);
  }
}

function getFaceFromScore(delta) {
  if (delta <= -3) return 'angry';
  if (delta <= -1) return 'annoyed';
  if (delta === 0) return 'normal';
  if (delta === 1) return 'normal';
  if (delta === 2) return 'embarrassed';
  if (delta >= 3) return affection > 60 ? 'smile' : 'embarrassed';
  return 'normal';
}

function toggleLog() {
  const log = document.getElementById('vn-log');
  log.classList.toggle('show');
}

function addToLog(role, text) {
  const log = document.getElementById('vn-log');
  const div = document.createElement('div');
  div.className = `log-msg ${role === 'player' ? 'player-log' : ''}`;
  div.innerHTML = `
    <div class="log-speaker">${role === 'player' ? '나' : '하루'}</div>
    <div class="log-text">${text}</div>`;
  log.appendChild(div);
}

function addMsg(role, text) {
  if (role === 'haru') {
    // 대화창 업데이트
    document.getElementById('vn-text').textContent = text;
    addToLog('haru', text);
  } else {
    // 플레이어 메시지는 로그에만
    addToLog('player', text);
  }
}

function addSystemMsg(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'vn-event';
  div.textContent = text;
  chat.appendChild(div);
}

function showTyping() {
  const bubble = document.getElementById('vn-bubble');
  bubble.innerHTML = `
    <div class="speaker">하루</div>
    <div class="typing-indicator">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
}

function removeTyping() {
  const bubble = document.getElementById('vn-bubble');
  bubble.innerHTML = `<div class="speaker">하루</div><div class="text" id="vn-text">...</div>`;
}

function updateAffection(delta) {
  affection = Math.max(0, Math.min(100, affection + delta));
  localStorage.setItem('haru_affection', affection);
  localStorage.setItem('haru_msgcount', msgCount);
  document.getElementById('affection-fill').style.width = affection + '%';
  document.getElementById('affection-label').textContent = `💗 ${affection}`;

  const status = document.getElementById('char-status');
  if (affection < 20) status.textContent = '츤츤거리는 중...';
  else if (affection < 40) status.textContent = '조금 마음이 열린 것 같은데...';
  else if (affection < 60) status.textContent = '은근히 신경 쓰이는 중';
  else if (affection < 80) status.textContent = '얼굴이 빨개진 것 같은...?';
  else status.textContent = '두근두근 💕';

  // 엔딩 체크
  if (affection >= 100 && !gameEnded) triggerEnding('good');
  if (affection <= 0 && msgCount > 5 && !gameEnded) triggerEnding('bad');
}

function triggerEnding(type) {
  gameEnded = true;
  setTimeout(() => {
    const overlay = document.getElementById('ending');
    if (type === 'good') {
      document.getElementById('ending-emoji').textContent = '💕';
      document.getElementById('ending-title').textContent = '해피 엔딩 🌸';
      document.getElementById('ending-desc').textContent = '"...바보야. 나도 좋아한다고."\n\n하루가 드디어 마음을 열었어요.\n당신과 하루의 이야기가 시작됩니다.';
    } else {
      document.getElementById('ending-emoji').textContent = '💔';
      document.getElementById('ending-title').textContent = '배드 엔딩';
      document.getElementById('ending-desc').textContent = '"...됐어. 이제 말 걸지 마."\n\n하루가 완전히 마음을 닫아버렸어요.\n다시 도전해보시겠어요?';
    }
    overlay.classList.add('show');
  }, 1000);
}

function restartGame() {
  affection = 0;
  exp = 0;
  msgCount = 0;
  gameEnded = false;
  storyActive = false;
  hiddenUnlocked = false;
  history = [];
  storyShown = {};
  localStorage.clear();
  document.getElementById('ending').classList.remove('show');
  document.getElementById('affection-fill').style.width = '0%';
  document.getElementById('affection-label').textContent = '💗 0';
  document.getElementById('chat').innerHTML = '';
  document.getElementById('char-status').textContent = '츤츤거리는 중...';
  document.getElementById('msg-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  startGame();
}

async function sendMessage() {
  if (isTyping || gameEnded || storyActive) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  addMsg('player', text);
  msgCount++;

  history.push({ role: 'user', parts: [{ text }] });

  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const res = await fetch(`https://haru-api.alexyang963.workers.dev/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: getSystemPrompt() }] },
        contents: history.slice(-10)
      })
    });

    const data = await res.json();

    if (data.error) {
      removeTyping();
      addSystemMsg(`❌ 오류: ${data.error.message}`);
      return;
    }

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '...';

    // " 딜리미터 파싱
    let replyText = raw;
    let delta = 0;
    try {
      const lastQuote = raw.lastIndexOf('"');
      if (lastQuote !== -1) {
        const scoreStr = raw.substring(lastQuote + 1).trim();
        const score = parseInt(scoreStr);
        if (!isNaN(score)) {
          delta = score;
          replyText = raw.substring(0, lastQuote).trim();
        }
      }
    } catch(e) {
      replyText = raw;
    }

    history.push({ role: 'model', parts: [{ text: raw }] });

    removeTyping();
    addMsg('haru', replyText);
    setHaruFace(getFaceFromScore(delta));
    addExp(delta);

    // 엔딩 체크
    if (affection >= 100 && !gameEnded) triggerEnding('good');
    if (affection <= 0 && msgCount > 10 && !gameEnded) triggerEnding('bad');

  } catch(e) {
    removeTyping();
    addSystemMsg('❌ 연결 오류가 발생했어요.');
  } finally {
    isTyping = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function handleKey(e) {
  // 데스크탑: 엔터로 전송 (shift+엔터는 줄바꿈)
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// 모바일: 전송 버튼 터치 이벤트 추가
document.getElementById('send-btn').addEventListener('touchend', function(e) {
  e.preventDefault();
  sendMessage();
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function startGame() {
  renderAffection();

  // 인트로 스토리 아직 안 봤으면 바로 시작
  if (!storyShown['intro']) {
    setTimeout(() => startStory('intro'), 500);
  } else {
    const greeting = affection < 15 ? '...뭐야, 또 왔어?\n딱히 반갑다거나 그런 건 아니지만.' :
      affection < 30 ? '...왔어. 뭐, 알아서 해.' :
      affection < 45 ? '...밥은 먹었어? 딱히 걱정은 아니지만.' :
      affection < 60 ? '...기다렸던 건 아니야. 진짜로.' :
      '...왔구나. 오늘도 얘기하러 온 거지?';
    setTimeout(() => addMsg('haru', greeting), 500);
  }
}

startGame();
